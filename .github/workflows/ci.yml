name: CI - Lint, Test, Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: syncdoc
          POSTGRES_PASSWORD: syncdoc_dev
          POSTGRES_DB: syncdoc
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:8-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint with Ruff
        working-directory: backend
        run: ruff check .

      - name: Format check with Ruff
        working-directory: backend
        run: ruff format . --check

      - name: Type check with MyPy
        working-directory: backend
        run: mypy app/

      - name: Run tests with pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://syncdoc:syncdoc_dev@localhost:5432/syncdoc
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -v --cov=app --cov-report=term-missing

  frontend:
    name: Frontend (TypeScript/React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint with ESLint
        working-directory: frontend
        run: npm run lint

      - name: Type check with TypeScript
        working-directory: frontend
        run: npx tsc --noEmit
