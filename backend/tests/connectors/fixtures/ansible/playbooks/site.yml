---
- name: Base configuration for all hosts
  hosts: all
  become: true
  roles:
    - common

- name: Configure Docker Swarm cluster
  hosts: swarm
  become: true
  roles:
    - docker_swarm

- name: Deploy monitoring stack
  hosts: managers
  become: true
  roles:
    - monitoring

- name: Deploy Traefik reverse proxy
  hosts: managers
  become: true
  roles:
    - traefik
