services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: syncdoc
      POSTGRES_PASSWORD: syncdoc_dev
      POSTGRES_DB: syncdoc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syncdoc -d syncdoc"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    environment:
      DATABASE_URL: postgresql+asyncpg://syncdoc:syncdoc_dev@postgres:5432/syncdoc
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      PYTHONUNBUFFERED: "1"
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_ENDPOINT_URL: ${LLM_ENDPOINT_URL:-}
      GH_CLIENT_ID: ${GH_CLIENT_ID:-}
      GH_CLIENT_SECRET: ${GH_CLIENT_SECRET:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      ALLOW_SELF_REGISTER: ${ALLOW_SELF_REGISTER:-true}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@syncdoc.dev}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-SyncDoc}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      REGISTRATION_NOTIFY_TO: ${REGISTRATION_NOTIFY_TO:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      PASSWORD_RESET_EXPIRE_MINUTES: ${PASSWORD_RESET_EXPIRE_MINUTES:-60}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    environment:
      DATABASE_URL: postgresql+asyncpg://syncdoc:syncdoc_dev@postgres:5432/syncdoc
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      PYTHONUNBUFFERED: "1"
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      LLM_ENDPOINT_URL: ${LLM_ENDPOINT_URL:-}
      GH_CLIENT_ID: ${GH_CLIENT_ID:-}
      GH_CLIENT_SECRET: ${GH_CLIENT_SECRET:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      ALLOW_SELF_REGISTER: ${ALLOW_SELF_REGISTER:-true}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@syncdoc.dev}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-SyncDoc}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      REGISTRATION_NOTIFY_TO: ${REGISTRATION_NOTIFY_TO:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      PASSWORD_RESET_EXPIRE_MINUTES: ${PASSWORD_RESET_EXPIRE_MINUTES:-60}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info

  frontend:
    image: node:24-alpine
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
